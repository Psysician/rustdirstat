name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # eframe on Linux requires X11/GTK system libraries not pre-installed on
      # GitHub Actions ubuntu runners.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgtk-3-dev libatk1.0-dev

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Verify rds-core zero-dep invariant
        shell: bash
        run: |
          set -euo pipefail
          DEPS=$(cargo tree -p rds-core --depth 1 --edges normal --prefix none | tail -n +2 | awk '{print $1}' | sort -u)
          for dep in $DEPS; do
            if [ -n "$dep" ] && [ "$dep" != "serde" ]; then
              echo "ERROR: rds-core has unexpected dependency: $dep"
              echo "rds-core must only depend on serde (beyond std)"
              exit 1
            fi
          done
          echo "rds-core zero-dep invariant verified"

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
